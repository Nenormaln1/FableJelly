<svg width="840" height="200" viewBox="0 0 840 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FableJelly">
  <defs>
    <linearGradient id="fj" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7dff"/>
      <stop offset="100%" stop-color="#ff9c6e"/>
    </linearGradient>
    <linearGradient id="fjSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff9c6e" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- gradient tick — the FableJelly section mark -->
  <rect x="34" y="66" width="68" height="68" rx="20" transform="rotate(45 68 100)" fill="url(#fj)"/>
  <rect x="22" y="54" width="92" height="92" rx="28" transform="rotate(45 68 100)" fill="url(#fjSoft)"/>

  <text x="150" y="127" font-family="Sora, Figtree, -apple-system, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#eceff8">Fable<tspan fill="url(#fj)">Jelly</tspan></text>

  <text x="154" y="166" font-family="Figtree, -apple-system, 'Segoe UI', sans-serif" font-size="21" font-weight="500" letter-spacing="6" fill="#6e758c">A CINEMATIC THEME FOR JELLYFIN</text>
</svg>
